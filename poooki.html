<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pooki Pooja G 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe0f0, #ffb3d9, #ffd6ec, #ff9ecf);
    background-size: 400% 400%;
    animation: bgMove 6s ease infinite;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Pacifico', cursive;
  }

  @keyframes bgMove {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Floating hearts */
  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .h {
    position: absolute;
    bottom: -60px;
    animation: floatUp linear infinite;
    opacity: 0.7;
    user-select: none;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 0.7; }
    100% { transform: translateY(-110vh) rotate(25deg) scale(1.2); opacity: 0; }
  }

  /* Center content */
  .center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* Big heart behind text */
  .big-heart {
    font-size: 18rem;
    line-height: 1;
    animation: heartbeat 1.4s ease-in-out infinite;
    filter: drop-shadow(0 10px 40px rgba(233,30,140,0.5));
    position: absolute;
    z-index: -1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -52%);
    pointer-events: none;
  }

  @keyframes heartbeat {
    0%,100% { transform: translate(-50%, -52%) scale(1); }
    14%     { transform: translate(-50%, -52%) scale(1.12); }
    28%     { transform: translate(-50%, -52%) scale(1); }
    42%     { transform: translate(-50%, -52%) scale(1.08); }
    70%     { transform: translate(-50%, -52%) scale(1); }
  }

  /* Main text */
  .name-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(3rem, 12vw, 7rem);
    color: white;
    text-shadow:
      0 0 20px rgba(233,30,140,0.8),
      3px 3px 0 #e91e8c,
      6px 6px 0 #c2185b;
    animation: textPop 2s cubic-bezier(.34,1.56,.64,1) both, shimmer 3s ease-in-out infinite 2s;
    letter-spacing: 4px;
    text-align: center;
  }

  @keyframes textPop {
    from { opacity: 0; transform: scale(0.3) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  @keyframes shimmer {
    0%,100% { text-shadow: 0 0 20px rgba(233,30,140,0.8), 3px 3px 0 #e91e8c, 6px 6px 0 #c2185b; }
    50%      { text-shadow: 0 0 40px rgba(255,100,200,1),  3px 3px 0 #ff4081, 6px 6px 0 #e91e8c; }
  }

  /* Stars strip */
  .stars {
    font-size: 2rem;
    letter-spacing: 12px;
    animation: twinkle 1.5s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.4; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1.05); }
  }
</style>
</head>
<body>

<div class="hearts-bg" id="hc"></div>

<div class="center">
  <div class="big-heart">💗</div>
  <div class="stars">🌸 💕 🌸 💕 🌸</div>
  <div class="name-text">Pooki Pooja G</div>
  <div class="stars">💖 ✨ 💖 ✨ 💖</div>
</div>

<script>
  const emojis = ['💕','💖','🌸','💗','💓','🌺','💞','✨','🌷','💝','🎀','🩷'];
  const hc = document.getElementById('hc');
  for (let i = 0; i < 40; i++) {
    const d = document.createElement('div');
    d.className = 'h';
    d.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    d.style.left = Math.random() * 100 + 'vw';
    d.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
    d.style.animationDuration = (5 + Math.random() * 10) + 's';
    d.style.animationDelay = (Math.random() * 8) + 's';
    hc.appendChild(d);
  }
</script>
</body>
</html>
